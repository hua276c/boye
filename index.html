    <h2>博野应急简介</h2>
    <br>
    <p>博野县应急管理局承担全县应急管理、防灾减灾、安全生产、防汛抗旱、应急救援等重要职能，坚持人民至上、生命至上，全力保障人民群众生命财产安全。</p>
  <p> 本局不断健全应急指挥体系、风险防控体系、应急保障体系，提升综合应急处置能力，为全县经济社会高质量发展提供坚实安全保障。</p>
